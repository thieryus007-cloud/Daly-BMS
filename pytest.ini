[pytest]
# ─────────────────────────────────────────────
# Daly BMS Interface — Configuration pytest
# ─────────────────────────────────────────────

# Mode asyncio : auto détecte toutes les coroutines comme tests async
asyncio_mode = auto

# Répertoire de test
testpaths = .

# Affichage verbeux par défaut
addopts =
    -v
    --tb=short
    --strict-markers

# Markers enregistrés (voir conftest.py)
markers =
    hardware: test nécessitant le BMS physique et le port UART
    integration: test nécessitant Mosquitto local

# Logging capturé pendant les tests
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S
