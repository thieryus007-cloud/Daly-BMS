# ── Mosquitto — Configuration DalyBMS ─────────────────────────────────────────

# Listener MQTT standard
listener 1883 0.0.0.0

# Listener WebSocket (Node-RED, clients browser)
listener 9001 0.0.0.0
protocol websockets

# Accès anonyme (réseau local privé — à sécuriser si exposé)
allow_anonymous true

# Persistance des messages (QoS 1/2, retained)
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information
log_timestamp true
