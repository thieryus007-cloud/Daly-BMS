# ── Grafana — Datasource InfluxDB (auto-provisionné) ─────────────────────────
# Grafana parle à InfluxDB via le réseau Docker interne (service "influxdb")
# Les scripts Python natifs, eux, utilisent localhost:8086

apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: ${INFLUX_ORG}
      defaultBucket: ${INFLUX_BUCKET}
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUX_TOKEN}
    editable: false
